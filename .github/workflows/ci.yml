name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Package smoke
        run: |
          npm pack --dry-run --ignore-scripts --json > /tmp/vernier-pack.json
          node - <<'NODE'
          const fs = require('node:fs')
          const pack = JSON.parse(fs.readFileSync('/tmp/vernier-pack.json', 'utf8'))[0]
          const files = new Set(pack.files.map((f) => f.path))
          for (const required of ['bin/vernier.js', 'dist/index.js', 'dist/cli/main.js', 'docs/safety.md']) {
            if (!files.has(required)) throw new Error(`missing ${required} from package`)
          }
          NODE
